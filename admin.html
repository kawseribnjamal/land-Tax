<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Land-Tax & Associates | অ্যাডমিন প্যানেল</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0a1a3a; --navy-light: #13294b; --green: #1a5c3e;
      --gold: #d4a13e; --gold-light: #e6bc6a; --white: #ffffff;
      --off-white: #f8fafc; --text: #1e293b; --border: #e2e8f0;
      --shadow: 0 8px 30px rgba(0,0,0,0.08); --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
    }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; padding: 40px 20px; }
    .admin-container { max-width: 1100px; margin: 0 auto; }
    
    /* Header */
    .admin-header { background: var(--navy); border-radius: 28px; padding: 28px 32px; text-align: center; margin-bottom: 30px; box-shadow: var(--shadow-lg); border: 1px solid rgba(212,161,62,0.2); }
    .admin-header h1 { color: var(--gold-light); font-size: 28px; margin-bottom: 8px; }
    .admin-header p { color: rgba(255,255,255,0.6); font-size: 14px; }
    .admin-logo { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; object-fit: cover; }
    
    /* Cards */
    .card { background: white; border-radius: 24px; padding: 32px; box-shadow: var(--shadow-lg); margin-bottom: 20px; }
    
    /* Login Box */
    .login-box { max-width: 400px; margin: 0 auto; text-align: center; }
    .login-box h2 { color: var(--navy); margin-bottom: 8px; }
    .login-box p { color: var(--text); opacity: 0.7; margin-bottom: 24px; font-size: 14px; }
    input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 15px; margin-bottom: 15px; font-family: 'Inter', sans-serif; }
    input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,161,62,0.2); }
    .login-btn { width: 100%; background: var(--navy); color: white; font-weight: 700; padding: 14px; border: none; border-radius: 40px; cursor: pointer; font-size: 16px; transition: all 0.2s; }
    .login-btn:hover { background: var(--navy-light); }
    .error-msg { color: #c62828; font-size: 13px; margin-top: 10px; }
    
    /* Dashboard */
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
    .stats { background: linear-gradient(135deg, var(--navy), var(--navy-light)); color: white; padding: 12px 24px; border-radius: 60px; display: inline-block; }
    .stats span { font-size: 28px; font-weight: 800; color: var(--gold-light); margin-right: 8px; }
    .btn-group { display: flex; gap: 12px; }
    .refresh-btn { background: var(--green); color: white; border: none; padding: 10px 22px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .logout-btn { background: #c62828; color: white; border: none; padding: 10px 22px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .home-link { background: rgba(10,26,58,0.1); color: var(--navy); text-decoration: none; padding: 10px 22px; border-radius: 40px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    .home-link:hover { background: rgba(10,26,58,0.2); }
    
    /* Table */
    .table-wrapper { overflow-x: auto; border-radius: 20px; border: 1px solid var(--border); background: white; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--navy); color: var(--gold-light); padding: 16px 14px; font-size: 13px; font-weight: 700; text-align: left; }
    td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); }
    tr:hover { background: var(--off-white); }
    .whatsapp-link { color: #25D366; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .whatsapp-link:hover { text-decoration: underline; }
    .empty-row td { text-align: center; padding: 40px; color: #94a3b8; }
    
    .back-home { display: inline-block; margin-top: 20px; text-align: center; width: 100%; }
    
    @media (max-width: 640px) {
      body { padding: 20px 16px; }
      .card { padding: 24px 20px; }
      th, td { padding: 10px 8px; font-size: 12px; }
      .dashboard-header { flex-direction: column; align-items: stretch; }
      .btn-group { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="admin-container">
  <div class="admin-header">
    <img class="admin-logo" src="1000046648.jpg" alt="Logo" onerror="this.src='https://placehold.co/70x70'">
    <h1><i class="fas fa-lock"></i> Land-Tax & Associates</h1>
    <p>অ্যাডমিন প্যানেল — গ্রাহক ত
