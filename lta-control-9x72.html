<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Land-Tax Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: #d4a13e; font-size: 28px; }
    .header p { color: #64748b; margin-top: 8px; }
    .login-box { max-width: 400px; margin: 0 auto; text-align: center; }
    input { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 14px; margin-bottom: 15px; font-size: 15px; }
    .btn { background: #0a1a3a; color: white; font-weight: 700; padding: 14px 24px; border: none; border-radius: 40px; cursor: pointer; width: 100%; font-size: 16px; }
    .btn:hover { opacity: 0.9; }
    .btn-green { background: #1a5c3e; }
    .btn-danger { background: #c62828; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
    .stats { background: #0a1a3a; color: white; padding: 10px 20px; border-radius: 40px; }
    .stats span { font-size: 28px; font-weight: 800; color: #d4a13e; }
    .table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid #e2e8f0; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #0a1a3a; color: #d4a13e; padding: 14px; text-align: left; }
    td { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; }
    tr:hover { background: #f8fafc; }
    .whatsapp-link { color: #25D366; text-decoration: none; font-weight: 600; }
    .delete-btn { background: none; border: none; color: #c62828; cursor: pointer; font-size: 18px; }
    .error-msg { color: #c62828; margin-top: 10px; text-align: center; padding: 10px; background: #ffebee; border-radius: 8px; }
    .success-msg { color: #1a5c3e; margin-top: 10px; text-align: center; padding: 10px; background: #e8f5e9; border-radius: 8px; }
    .hidden { display: none; }
    .loading { opacity: 0.6; pointer-events: none; }
    @media (max-width: 640px) { .card { padding: 20px; } th, td { padding: 8px; font-size: 12px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1><i class="fas fa-lock"></i> Land-Tax Admin Panel</h1>
      <p>শুধুমাত্র অনুমোদিত ব্যক্তি প্রবেশ করতে পারবেন</p>
    </div>
    
    <!-- Login Section -->
    <div id="loginSection">
      <div class="login-box">
        <input type="email" id="adminEmail" placeholder="Admin Email" value="kawseribnjamal58@gmail.com">
        <input type="password" id="adminPassword" placeholder="Password">
        <button id="loginBtn" class="btn"><i class="fas fa-sign-in-alt"></i> লগইন করুন</button>
        <div id="loginError" class="error-msg hidden"></div>
      </div>
    </div>
    
    <!-- Dashboard Section -->
    <div id="dashboardSection" class="hidden">
      <div class="toolbar">
        <div class="stats"><i class="fas fa-users"></i> মোট আবেদন: <span id="totalCount">0</span> জন</div>
        <div>
          <button id="exportCsvBtn" class="btn-green"><i class="fas fa-file-csv"></i> CSV</button>
          <button id="exportExcelBtn" class="btn-green"><i class="fas fa-file-excel"></i> Excel</button>
          <button id="refreshBtn" class="btn"><i class="fas fa-sync-alt"></i> রিফ্রেশ</button>
          <button id="logoutBtn" class="btn-danger"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="dataTable">
          <thead>
            <tr><th>#</th><th>নাম</th><th>WhatsApp</th><th>ব্যাংক</th><th>তারিখ</th><th>অ্যাকশন</th></tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;">লোড হচ্ছে...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDqt6uCDoJhU4LWWHk1eFM_d4cVUeeU_V8",
    authDomain: "land-tax-8744a.firebaseapp.com",
    databaseURL: "https://land-tax-8744a-default-rtdb.firebaseio.com",
    projectId: "land-tax-8744a",
    storageBucket: "land-tax-8744a.firebasestorage.app"
  };
  
  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  let currentData = [];

  // DOM Elements
  const loginSection = document.getElementById('loginSection');
  const dashboardSection = document.getElementById('dashboardSection');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const exportCsvBtn = document.getElementById('exportCsvBtn');
  const exportExcelBtn = document.getElementById('exportExcelBtn');
  const loginError = document.getElementById('loginError');
  const tableBody = document.getElementById('tableBody');
  const totalCountSpan = document.getElementById('totalCount');

  // Helper Functions
  function showError(element, message) {
    element.innerHTML = message;
    element.classList.remove('hidden');
    setTimeout(() => {
      element.classList.add('hidden');
    }, 5000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Load Data from Firebase
  async function loadData() {
    if (!tableBody) return;
    tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">লোড হচ্ছে...</td></tr>';
    
    try {
      const snapshot = await db.ref('customers').once('value');
      const data = snapshot.val();
      
      if (!data) {
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">কোনো আবেদন নেই</td></tr>';
        totalCountSpan.innerText = '0';
        currentData = [];
        return;
      }
      
      currentData = [];
      for (let key in data) {
        if (data.hasOwnProperty(key)) {
          currentData.push({ id: key, ...data[key] });
        }
      }
      currentData.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      totalCountSpan.innerText = currentData.length;
      
      let html = '';
      currentData.forEach((item, idx) => {
        const date = item.timestamp ? new Date(item.timestamp).toLocaleString('bn-BD') : 'নতুন';
        const waLink = `https://wa.me/88${item.whatsapp}`;
        html += `
          <tr>
            <td>${idx + 1}</td>
            <td>${escapeHtml(item.fullName || '—')}</td>
            <td><a href="${waLink}" target="_blank" class="whatsapp-link"><i class="fab fa-whatsapp"></i> ${escapeHtml(item.whatsapp)}</a></td>
            <td>${escapeHtml(item.bankName || '—')}</td>
            <td>${date}</td>
            <td><button class="delete-btn" onclick="deleteEntry('${item.id}')"><i class="fas fa-trash-alt"></i></button></td>
          </tr>
        `;
      });
      tableBody.innerHTML = html;
    } catch (error) {
      console.error('Error loading data:', error);
      tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">ডাটা লোড করতে ব্যর্থ। Firebase Rules চেক করুন।</td></tr>';
    }
  }

  // Delete Entry
  window.deleteEntry = async (id) => {
    if (confirm('আপনি কি এই আবেদনটি ডিলিট করতে চান?')) {
      try {
        await db.ref('customers/' + id).remove();
        loadData();
      } catch (error) {
        alert('ডিলিট করতে ব্যর্থ: ' + error.message);
      }
    }
  };

  // Export to CSV
  window.exportToCSV = () => {
    if (currentData.length === 0) {
      alert('কোনো ডাটা নেই');
      return;
    }
    let csv = "\uFEFFক্রমিক,নাম,WhatsApp নম্বর,ব্যাংকের নাম,তারিখ\n";
    currentData.forEach((item, i) => {
      const date = item.timestamp ? new Date(item.timestamp).toLocaleString('bn-BD') : '';
      csv += `${i + 1},"${item.fullName || ''}","${item.whatsapp || ''}","${item.bankName || ''}","${date}"\n`;
    });
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `landtax_data_${Date.now()}.csv`;
    link.click();
  };

  // Export to Excel
  window.exportToExcel = () => {
    if (currentData.length === 0) {
      alert('কোনো ডাটা নেই');
      return;
    }
    const excelData = currentData.map((item, i) => ({
      'ক্রমিক': i + 1,
      'নাম': item.fullName || '',
      'WhatsApp নম্বর': item.whatsapp || '',
      'ব্যাংকের নাম': item.bankName || '',
      'তারিখ': item.timestamp ? new Date(item.timestamp).toLocaleString('bn-BD') : ''
    }));
    const ws = XLSX.utils.json_to_sheet(excelData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Applications');
    XLSX.writeFile(wb, `landtax_data_${Date.now()}.xlsx`);
  };

  // Login Function
  async function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    
    loginError.classList.add('hidden');
    
    if (!email || !password) {
      showError(loginError, '❌ ইমেইল এবং পাসওয়ার্ড দিন');
      return;
    }
    
    // Disable button while loading
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> লগইন হচ্ছে...';
    
    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      console.log('Login successful:', userCredential.user.email);
      // Login successful - UI will update via onAuthStateChanged
    } catch (error) {
      console.error('Login error:', error.code, error.message);
      let errorMessage = '❌ লগইন ব্যর্থ! ';
      
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found') {
        errorMessage += 'ইউজার পাওয়া যায়নি। Firebase Authentication এ ইউজার তৈরি করুন।';
      } else if (error.code === 'auth/wrong-password') {
        errorMessage += 'পাসওয়ার্ড ভুল!';
      } else if (error.code === 'auth/invalid-email') {
        errorMessage += 'সঠিক ইমেইল দিন!';
      } else {
        errorMessage += error.message;
      }
      showError(loginError, errorMessage);
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
    }
  }

  // Logout Function
  async function adminLogout() {
    try {
      await auth.signOut();
    } catch (error) {
      console.error('Logout error:', error);
    }
  }

  // Auth State Listener
  auth.onAuthStateChanged((user) => {
    if (user) {
      // User is logged in
      loginSection.classList.add('hidden');
      dashboardSection.classList.remove('hidden');
      loadData();
    } else {
      // User is logged out
      loginSection.classList.remove('hidden');
      dashboardSection.classList.add('hidden');
      // Reset login button state
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
      // Clear password field
      document.getElementById('adminPassword').value = '';
    }
  });

  // Event Listeners
  loginBtn.addEventListener('click', adminLogin);
  logoutBtn.addEventListener('click', adminLogout);
  refreshBtn.addEventListener('click', loadData);
  exportCsvBtn.addEventListener('click', exportToCSV);
  exportExcelBtn.addEventListener('click', exportToExcel);
  
  // Enter key press on password field
  document.getElementById('adminPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      adminLogin();
    }
  });
</script>
</body>
</html>
